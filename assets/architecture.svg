<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f14"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22c55e"/>
    </marker>
    <marker id="arrowDash" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="960" height="480" fill="url(#bg2)" rx="10"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="80" x2="960" y2="80"/>
    <line x1="0" y1="160" x2="960" y2="160"/>
    <line x1="0" y1="240" x2="960" y2="240"/>
    <line x1="0" y1="320" x2="960" y2="320"/>
    <line x1="0" y1="400" x2="960" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="480"/>
    <line x1="480" y1="0" x2="480" y2="480"/>
    <line x1="640" y1="0" x2="640" y2="480"/>
    <line x1="800" y1="0" x2="800" y2="480"/>
  </g>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle"
    font-family="'SF Mono','JetBrains Mono','Fira Code','Consolas',monospace"
    font-size="16" font-weight="600" fill="#e2e8f0" letter-spacing="2">MONOZUKURI — AUTONOMOUS LOOP</text>
  <line x1="80" y1="48" x2="880" y2="48" stroke="#334155" stroke-width="1"/>

  <!-- ──────────────────────────────────────────────── -->
  <!-- COLUMN 1: Backlog Sources -->
  <!-- ──────────────────────────────────────────────── -->
  <text x="130" y="84" text-anchor="middle"
    font-family="-apple-system,'Segoe UI',sans-serif"
    font-size="11" fill="#64748b" letter-spacing="1">SOURCES</text>

  <!-- Linear -->
  <rect x="50" y="96" width="160" height="44" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="80" y="121" font-family="'SF Mono','Consolas',monospace" font-size="13" fill="#e2e8f0">Linear</text>
  <text x="80" y="134" font-family="-apple-system,sans-serif" font-size="10" fill="#64748b">Issues via GraphQL</text>
  <rect x="50" y="96" width="4" height="44" rx="3" fill="#a78bfa"/>

  <!-- GitHub Issues -->
  <rect x="50" y="156" width="160" height="44" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="80" y="181" font-family="'SF Mono','Consolas',monospace" font-size="13" fill="#e2e8f0">GitHub</text>
  <text x="80" y="194" font-family="-apple-system,sans-serif" font-size="10" fill="#64748b">Issues via gh CLI</text>
  <rect x="50" y="156" width="4" height="44" rx="3" fill="#6366f1"/>

  <!-- Markdown -->
  <rect x="50" y="216" width="160" height="44" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="80" y="241" font-family="'SF Mono','Consolas',monospace" font-size="13" fill="#e2e8f0">Markdown</text>
  <text x="80" y="254" font-family="-apple-system,sans-serif" font-size="10" fill="#64748b">features.md backlog</text>
  <rect x="50" y="216" width="4" height="44" rx="3" fill="#22c55e"/>

  <!-- Jira (future) -->
  <rect x="50" y="276" width="160" height="44" rx="6" fill="#111827" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="80" y="301" font-family="'SF Mono','Consolas',monospace" font-size="13" fill="#374151">Jira / Notion</text>
  <text x="80" y="314" font-family="-apple-system,sans-serif" font-size="10" fill="#374151">coming soon</text>

  <!-- Arrows from sources to monozukuri box -->
  <line x1="211" y1="118" x2="298" y2="160" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowBlue)" opacity="0.7"/>
  <line x1="211" y1="178" x2="298" y2="210" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowBlue)" opacity="0.7"/>
  <line x1="211" y1="238" x2="298" y2="240" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowBlue)" opacity="0.7"/>

  <!-- ──────────────────────────────────────────────── -->
  <!-- COLUMN 2: Monozukuri Core -->
  <!-- ──────────────────────────────────────────────── -->

  <!-- Outer container -->
  <rect x="300" y="70" width="360" height="340" rx="10" fill="#111827" stroke="#6366f1" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="480" y="96" text-anchor="middle"
    font-family="'SF Mono','JetBrains Mono','Fira Code','Consolas',monospace"
    font-size="14" font-weight="700" fill="#a78bfa">monozukuri</text>
  <text x="480" y="112" text-anchor="middle"
    font-family="-apple-system,sans-serif"
    font-size="10" fill="#6366f1" letter-spacing="1">ものづくり</text>

  <line x1="316" y1="120" x2="644" y2="120" stroke="#1e293b" stroke-width="1"/>

  <!-- Stage 1: Size Gate -->
  <rect x="330" y="132" width="300" height="52" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <circle cx="360" cy="158" r="14" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="360" y="163" text-anchor="middle" font-family="'SF Mono',monospace" font-size="11" fill="#f59e0b">①</text>
  <text x="386" y="153" font-family="'SF Mono','Consolas',monospace" font-size="12" fill="#e2e8f0">Size Gate</text>
  <text x="386" y="170" font-family="-apple-system,sans-serif" font-size="10" fill="#64748b">ADR-008 • cost + complexity check</text>

  <!-- Arrow down -->
  <line x1="480" y1="184" x2="480" y2="196" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Stage 2: Worktree -->
  <rect x="330" y="198" width="300" height="52" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <circle cx="360" cy="224" r="14" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="360" y="229" text-anchor="middle" font-family="'SF Mono',monospace" font-size="11" fill="#22c55e">②</text>
  <text x="386" y="219" font-family="'SF Mono','Consolas',monospace" font-size="12" fill="#e2e8f0">Git Worktree</text>
  <text x="386" y="236" font-family="-apple-system,sans-serif" font-size="10" fill="#64748b">isolated branch + context carry-forward</text>

  <!-- Arrow down -->
  <line x1="480" y1="250" x2="480" y2="262" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Stage 3: Skill Invocation -->
  <rect x="330" y="264" width="300" height="60" rx="6" fill="#1a1a2e" stroke="#6366f1" stroke-width="1.5"/>
  <circle cx="360" cy="294" r="14" fill="#6366f1" stroke="#818cf8" stroke-width="1.5"/>
  <text x="360" y="299" text-anchor="middle" font-family="'SF Mono',monospace" font-size="11" fill="#fff">③</text>
  <text x="386" y="285" font-family="'SF Mono','Consolas',monospace" font-size="12" fill="#a78bfa">Claude Code Skill</text>
  <text x="386" y="300" font-family="-apple-system,sans-serif" font-size="10" fill="#64748b">PRD → TechSpec → Tasks → Code → Tests</text>
  <text x="386" y="314" font-family="'SF Mono','Consolas',monospace" font-size="10" fill="#475569">default: /feature-marker</text>

  <!-- Arrow down -->
  <line x1="480" y1="324" x2="480" y2="336" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Stage 4: Cycle Gate + PR -->
  <rect x="330" y="338" width="300" height="52" rx="6" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <circle cx="360" cy="364" r="14" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="360" y="369" text-anchor="middle" font-family="'SF Mono',monospace" font-size="11" fill="#22c55e">④</text>
  <text x="386" y="359" font-family="'SF Mono','Consolas',monospace" font-size="12" fill="#e2e8f0">Cycle Gate → PR</text>
  <text x="386" y="376" font-family="-apple-system,sans-serif" font-size="10" fill="#64748b">ADR-008 • verify phases + open pull request</text>

  <!-- ──────────────────────────────────────────────── -->
  <!-- COLUMN 3: Output + Learning -->
  <!-- ──────────────────────────────────────────────── -->
  <text x="828" y="84" text-anchor="middle"
    font-family="-apple-system,'Segoe UI',sans-serif"
    font-size="11" fill="#64748b" letter-spacing="1">OUTPUT</text>

  <!-- PR 1 -->
  <rect x="750" y="96" width="156" height="44" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="780" y="118" font-family="'SF Mono','Consolas',monospace" font-size="12" fill="#e2e8f0">✓ feat-001 PR</text>
  <text x="780" y="131" font-family="-apple-system,sans-serif" font-size="10" fill="#64748b">tests pass · reviewed</text>

  <!-- PR 2 -->
  <rect x="750" y="156" width="156" height="44" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="780" y="178" font-family="'SF Mono','Consolas',monospace" font-size="12" fill="#e2e8f0">✓ feat-002 PR</text>
  <text x="780" y="191" font-family="-apple-system,sans-serif" font-size="10" fill="#64748b">tests pass · reviewed</text>

  <!-- PR n -->
  <text x="828" y="220" text-anchor="middle" fill="#475569" font-size="18">⋮</text>

  <!-- PR n+1 -->
  <rect x="750" y="230" width="156" height="44" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="780" y="252" font-family="'SF Mono','Consolas',monospace" font-size="12" fill="#94a3b8">feat-00n PR</text>
  <text x="780" y="265" font-family="-apple-system,sans-serif" font-size="10" fill="#64748b">in progress…</text>

  <!-- Arrow: monozukuri → PRs -->
  <line x1="661" y1="178" x2="748" y2="140" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)" opacity="0.8"/>
  <line x1="661" y1="200" x2="748" y2="180" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)" opacity="0.8"/>
  <line x1="661" y1="230" x2="748" y2="252" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)" opacity="0.5" stroke-dasharray="4,3"/>

  <!-- ──────────────────────────────────────────────── -->
  <!-- Learning feedback loop -->
  <!-- ──────────────────────────────────────────────── -->
  <rect x="300" y="430" width="360" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="480" y="452" text-anchor="middle"
    font-family="'SF Mono','Consolas',monospace"
    font-size="11" fill="#475569">3-tier learning store · ADR-008 PR-C</text>

  <!-- Loop arrow: learning → sources -->
  <path d="M 300 448 Q 130 448 130 360 Q 130 298 210 298" stroke="#475569" stroke-width="1.5"
    stroke-dasharray="5,3" fill="none" marker-end="url(#arrowDash)" opacity="0.6"/>

  <!-- Loop label -->
  <text x="155" y="408"
    font-family="-apple-system,sans-serif" font-size="10" fill="#475569"
    transform="rotate(-90,155,408)">learning loop</text>

  <!-- ──────────────────────────────────────────────── -->
  <!-- Autonomy legend (bottom right) -->
  <!-- ──────────────────────────────────────────────── -->
  <rect x="680" y="400" width="240" height="64" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="800" y="419" text-anchor="middle"
    font-family="-apple-system,sans-serif" font-size="10" fill="#64748b" letter-spacing="1">AUTONOMY</text>

  <circle cx="706" cy="437" r="5" fill="#f59e0b"/>
  <text x="718" y="441" font-family="'SF Mono','Consolas',monospace" font-size="11" fill="#94a3b8">supervised</text>

  <circle cx="706" cy="454" r="5" fill="#6366f1"/>
  <text x="718" y="458" font-family="'SF Mono','Consolas',monospace" font-size="11" fill="#94a3b8">checkpoint</text>

  <circle cx="800" cy="437" r="5" fill="#22c55e"/>
  <text x="812" y="441" font-family="'SF Mono','Consolas',monospace" font-size="11" fill="#94a3b8">full_auto</text>

  <!-- Bottom caption -->
  <text x="480" y="472" text-anchor="middle"
    font-family="-apple-system,sans-serif" font-size="10" fill="#374151">
    github.com/Viniciuscarvalho/monozukuri
  </text>
</svg>
