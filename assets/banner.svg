<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="1200" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f14;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#6366f1;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#a78bfa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="kanjiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="240" fill="url(#bg)" rx="8"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="240"/>
    <line x1="400" y1="0" x2="400" y2="240"/>
    <line x1="600" y1="0" x2="600" y2="240"/>
    <line x1="800" y1="0" x2="800" y2="240"/>
    <line x1="1000" y1="0" x2="1000" y2="240"/>
  </g>

  <!-- Left accent glow blob -->
  <ellipse cx="60" cy="120" rx="80" ry="80" fill="#6366f1" opacity="0.08"/>

  <!-- Divider line (vertical) -->
  <line x1="340" y1="30" x2="340" y2="210" stroke="#6366f1" stroke-width="1" opacity="0.4"/>

  <!-- === LEFT SIDE: kanji === -->
  <!-- ものづくり rendered as individual characters in a large monospaced stack -->
  <text x="170" y="108"
    font-family="'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', 'MS Gothic', sans-serif"
    font-size="88"
    font-weight="700"
    text-anchor="middle"
    fill="url(#kanjiGrad)"
    filter="url(#glow)"
    letter-spacing="-2">もの</text>
  <text x="170" y="196"
    font-family="'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', 'MS Gothic', sans-serif"
    font-size="88"
    font-weight="700"
    text-anchor="middle"
    fill="url(#kanjiGrad)"
    opacity="0.85"
    letter-spacing="-2">づくり</text>

  <!-- === RIGHT SIDE: wordmark + tagline === -->

  <!-- Monozukuri wordmark -->
  <text x="380" y="100"
    font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace"
    font-size="52"
    font-weight="700"
    fill="#e2e8f0"
    letter-spacing="-1">Monozukuri</text>

  <!-- Tagline -->
  <text x="382" y="138"
    font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace"
    font-size="17"
    fill="#6366f1"
    letter-spacing="0.5">The art of making things</text>

  <!-- Sub-tagline -->
  <text x="382" y="162"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="15"
    fill="#64748b"
    letter-spacing="0.3">Autonomous feature delivery for Claude Code</text>

  <!-- Bottom accent line -->
  <line x1="0" y1="225" x2="1200" y2="225" stroke="url(#accentLine)" stroke-width="2"/>

  <!-- Flow icons: backlog → worktree → PR -->
  <g transform="translate(382, 188)" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="12" fill="#475569">
    <!-- Backlog box -->
    <rect x="0" y="0" width="72" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="36" y="15" text-anchor="middle" fill="#94a3b8">backlog</text>
    <!-- arrow -->
    <text x="80" y="15" fill="#6366f1">→</text>
    <!-- worktree box -->
    <rect x="96" y="0" width="72" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="132" y="15" text-anchor="middle" fill="#94a3b8">worktree</text>
    <!-- arrow -->
    <text x="176" y="15" fill="#6366f1">→</text>
    <!-- skill box -->
    <rect x="192" y="0" width="52" height="22" rx="4" fill="#1e293b" stroke="#6366f1" stroke-width="1"/>
    <text x="218" y="15" text-anchor="middle" fill="#a78bfa">skill</text>
    <!-- arrow -->
    <text x="252" y="15" fill="#6366f1">→</text>
    <!-- pr box -->
    <rect x="268" y="0" width="40" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="288" y="15" text-anchor="middle" fill="#94a3b8">PR</text>
  </g>

  <!-- Top-right: version badge -->
  <g transform="translate(1080, 20)">
    <rect x="0" y="0" width="100" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="50" y="16" text-anchor="middle"
      font-family="'SF Mono', 'Fira Code', 'Consolas', monospace"
      font-size="12" fill="#64748b">v1.0.0 · MIT</text>
  </g>
</svg>
